<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>記帳 Web</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="記帳 Web">
  
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%23111827%22/><text y=%22.9em%22 x=%227%22 font-size=%2276%22>💰</text></svg>">
  
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    html, body {
      position: fixed;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0b0f19;
      color: #f3f4f6;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .safe-bottom {
      padding-bottom: env(safe-area-inset-bottom);
    }
    .scrollable-list {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .page-slide {
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    input {
      font-size: 16px !important;
    }

    /* 🚀 左右滑動卡片核心 CSS */
    .snap-x-container {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }
    /* 隱藏滾動條 */
    .snap-x-container::-webkit-scrollbar {
      display: none;
    }
    .snap-card {
      min-width: 100%;
      scroll-snap-align: center;
      scroll-snap-stop: always;
    }
  </style>
</head>
<body class="font-sans antialiased text-gray-200">

  <div id="main-screen" class="flex flex-col h-full justify-between p-6 pt-12">
    
    <div class="flex justify-between items-center w-full">
      <span class="text-xl font-bold text-gray-200">記帳 Web</span>
      <span id="current-month-badge" class="text-xs text-indigo-400 font-semibold bg-indigo-950/50 border border-indigo-900/60 px-3 py-1 rounded-full">2026 年 06 月</span>
    </div>

    <div class="my-2">
      <div id="month-slider" class="snap-x-container w-full" onscroll="handleSliderScroll()">
        </div>
    </div>

    <div class="flex flex-col items-center justify-center space-y-2 my-1">
      <div class="w-40 h-40 relative flex items-center justify-center">
        <canvas id="expense-chart"></canvas>
        <div id="no-data-tip" class="absolute text-gray-500 text-xs hidden">該月尚無數據</div>
      </div>
    </div>

    <div class="flex-1 flex flex-col min-h-0 mb-4">
      <div class="flex justify-between items-center mb-2">
        <p id="list-title" class="text-xs text-gray-400 font-medium">該月消費紀錄</p>
        <button onclick="toggleHistoryPage(true)" class="text-xs text-indigo-400 font-semibold hover:underline">查看完整歷史 ➡️</button>
      </div>
      <div id="recent-list" class="space-y-2 flex-1 scrollable-list"></div>
    </div>
    
    <div class="safe-bottom w-full">
      <button onclick="openLedger()" class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-transform duration-100 text-base">
        + 新增一筆消費
      </button>
    </div>
  </div>


  <div id="history-page" class="page-slide fixed inset-0 bg-[#0b0f19] z-40 flex flex-col p-6 pt-12 transform translate-x-full">
    <div class="flex justify-between items-center mb-6">
      <button onclick="toggleHistoryPage(false)" class="text-sm text-gray-400 bg-gray-800 px-3 py-1.5 rounded-full flex items-center">⬅️ 返回首頁</button>
      <h2 class="text-lg font-bold text-gray-200">完整歷史總明細</h2>
      <div class="w-16"></div>
    </div>

    <div id="full-history-list" class="flex-1 scrollable-list space-y-2.5 pb-2"></div>

    <div class="pt-4 pb-4 border-t border-gray-800 safe-bottom">
      <button onclick="clearLocalOnly()" class="w-full bg-red-950/40 text-red-400 border border-red-900/50 py-3 rounded-xl text-xs font-medium active:scale-95 transition-transform">
        ⚠️ 僅清空手機本地紀錄 (不影響雲端試算表)
      </button>
    </div>
  </div>


  <div id="ledger-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden flex-col justify-end z-50">
    <div class="bg-gray-900 rounded-t-3xl p-6 space-y-6 max-h-[90vh] overflow-y-auto safe-bottom border-t border-gray-800">
      
      <div class="flex justify-between items-center">
        <h2 id="step-title" class="text-xl font-bold text-gray-200">步驟 1: 選擇日期</h2>
        <div class="flex space-x-2">
          <button id="delete-btn" onclick="deleteCurrentRecord()" class="text-red-400 text-sm bg-red-950/40 border border-red-900 px-3 py-1 rounded-full hidden">刪除</button>
          <button onclick="closeLedger()" class="text-gray-400 text-sm bg-gray-800 px-3 py-1 rounded-full">取消</button>
        </div>
      </div>

      <div class="w-full bg-gray-800 h-1.5 rounded-full overflow-hidden">
        <div id="progress-bar" class="bg-indigo-500 h-full w-1/5 transition-all duration-300"></div>
      </div>

      <div id="form-container" class="space-y-6 min-h-[220px] flex flex-col justify-center">
        <div id="step-1" class="step-field space-y-2">
          <label class="block text-sm text-gray-400">消費日期</label>
          <input type="date" id="input-date" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-indigo-500">
        </div>
        <div id="step-2" class="step-field space-y-3 hidden">
          <label class="block text-sm text-gray-400">選擇大項目</label>
          <div class="grid grid-cols-3 gap-3">
            <button onclick="selectCategory('餐飲')" class="cat-btn bg-gray-800 p-4 rounded-xl flex flex-col items-center space-y-1 border border-transparent">
              <span class="text-2xl">🍔</span><span class="text-sm">餐飲</span>
            </button>
            <button onclick="selectCategory('交通')" class="cat-btn bg-gray-800 p-4 rounded-xl flex flex-col items-center space-y-1 border border-transparent">
              <span class="text-2xl">🚗</span><span class="text-sm">交通</span>
            </button>
            <button onclick="selectCategory('娛樂')" class="cat-btn bg-gray-800 p-4 rounded-xl flex flex-col items-center space-y-1 border border-transparent">
              <span class="text-2xl">🎉</span><span class="text-sm">娛樂</span>
            </button>
            <button onclick="selectCategory('購物')" class="cat-btn bg-gray-800 p-4 rounded-xl flex flex-col items-center space-y-1 border border-transparent">
              <span class="text-2xl">🛍️</span><span class="text-sm">購物</span>
            </button>
            <button onclick="selectCategory('居家')" class="cat-btn bg-gray-800 p-4 rounded-xl flex flex-col items-center space-y-1 border border-transparent">
              <span class="text-2xl">🏠</span><span class="text-sm">居家</span>
            </button>
            <button onclick="selectCategory('其他')" class="cat-btn bg-gray-800 p-4 rounded-xl flex flex-col items-center space-y-1 border border-transparent">
              <span class="text-2xl">✨</span><span class="text-sm">其他</span>
            </button>
          </div>
        </div>
        <div id="step-3" class="step-field space-y-2 hidden">
          <label class="block text-sm text-gray-400">消費細項說明</label>
          <input type="text" id="input-detail" placeholder="例如：午餐便當..." class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-indigo-500" autocomplete="off">
        </div>
        <div id="step-4" class="step-field space-y-2 hidden">
          <label class="block text-sm text-gray-400">金額 ($)</label>
          <input type="number" id="input-amount" inputmode="decimal" placeholder="0" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white text-xl font-bold focus:outline-none focus:border-indigo-500">
        </div>
        <div id="step-5" class="step-field space-y-2 hidden">
          <label class="block text-sm text-gray-400">備註 (選填)</label>
          <input type="text" id="input-note" placeholder="想寫什麼都可以..." class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-indigo-500" autocomplete="off">
        </div>
      </div>

      <div class="pt-2">
        <button id="next-btn" onclick="nextStep()" class="w-full bg-indigo-500 text-white font-bold py-3 rounded-xl active:scale-95 transition-transform duration-100"></button>
      </div>
    </div>
  </div>


  <script>
    const GOOGLE_GAS_URL = "https://script.google.com/macros/s/AKfycbw11Uaq8LF_vkboYpLGJwk3152Ru6YkKO-x8po49tWjaG26bbmDtA_g2daEmSo3Z1Sv/exec";

    let currentStep = 1;
    let chartInstance = null;
    let editingId = null; 
    let scrollTimeout = null;
    
    // 追蹤當前滑動選中的月份（格式: "YYYY-MM"）
    let selectedMonthStr = new Date().toLocaleDateString('en-CA').substring(0, 7);
    let availableMonths = []; // 存儲所有有記帳數據的月份清單

    let currentRecord = { id: '', date: '', category: '', detail: '', amount: 0, note: '', synced: false };

    const stepTitles = { 1: "步驟 1: 選擇日期", 2: "步驟 2: 選擇大項目", 3: "步驟 3: 輸入細項說明", 4: "步驟 4: 輸入消費金額", 5: "步驟 5: 填寫備註 (選填)" };
    const categoryIcons = { '餐飲食': '🍔', '餐飲': '🍔', '交通': '🚗', '娛樂': '🎉', '購物': '🛍️', '居家': '🏠', '其他': '✨' };

    window.onload = function() {
      initChart();
      updateDashboard(true); // 首次加載需要重構卡片
    };

    function toggleHistoryPage(show) {
      const page = document.getElementById('history-page');
      if (show) { page.classList.replace('translate-x-full', 'translate-x-0'); }
      else { page.classList.replace('translate-x-0', 'translate-x-full'); }
    }

    function openLedger(id = null) {
      if (id !== null) {
        editingId = id;
        const records = getRecords();
        const record = records.find(r => r.id === id);
        currentRecord = { ...record };
        
        document.getElementById('input-date').value = currentRecord.date;
        document.getElementById('input-detail').value = currentRecord.detail;
        document.getElementById('input-amount').value = currentRecord.amount;
        document.getElementById('input-note').value = currentRecord.note;
        document.getElementById('delete-btn').classList.remove('hidden');
        highlightCategoryButton(currentRecord.category);
      } else {
        editingId = null;
        const randomId = 'rec_' + Date.now() + '_' + Math.floor(Math.random() * 1000);
        currentRecord = { id: randomId, date: '', category: '', detail: '', amount: 0, note: '', synced: false };
        document.getElementById('input-date').value = new Date().toLocaleDateString('en-CA');
        document.getElementById('input-detail').value = '';
        document.getElementById('input-amount').value = '';
        document.getElementById('input-note').value = '';
        document.getElementById('delete-btn').classList.add('hidden');
        clearCategoryButtons();
      }
      
      currentStep = 1;
      showStep(currentStep);
      document.getElementById('ledger-modal').classList.replace('hidden', 'flex');
    }

    function closeLedger() { document.getElementById('ledger-modal').classList.replace('flex', 'hidden'); }

    function showStep(step) {
      document.getElementById('step-title').innerText = stepTitles[step];
      document.getElementById('progress-bar').style.width = `${(step / 5) * 100}%`;

      for (let i = 1; i <= 5; i++) {
        const field = document.getElementById(`step-${i}`);
        if (i === step) {
          field.classList.remove('hidden');
          if (step === 3) document.getElementById('input-detail').focus();
          if (step === 4) document.getElementById('input-amount').focus();
          if (step === 5) document.getElementById('input-note').focus();
        } else { field.classList.add('hidden'); }
      }

      const nextBtn = document.getElementById('next-btn');
      if (step === 5) {
        nextBtn.innerText = editingId !== null ? "儲存修改" : "完成記帳並儲存";
        nextBtn.classList.replace('bg-indigo-500', 'bg-emerald-500');
      } else {
        nextBtn.innerText = "下一步";
        nextBtn.classList.replace('bg-emerald-500', 'bg-indigo-500');
      }
    }

    function selectCategory(catName) {
      currentRecord.category = catName;
      highlightCategoryButton(catName);
      setTimeout(() => { nextStep(); }, 120);
    }

    function highlightCategoryButton(catName) {
      document.querySelectorAll('.cat-btn').forEach(btn => {
        if (btn.innerText.includes(catName)) { btn.classList.add('border-indigo-500', 'bg-indigo-900/40'); }
        else { btn.classList.remove('border-indigo-500', 'bg-indigo-900/40'); }
      });
    }

    function clearCategoryButtons() {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('border-indigo-500', 'bg-indigo-900/40'));
    }

    function nextStep() {
      if (currentStep === 1) {
        currentRecord.date = document.getElementById('input-date').value;
        if (!currentRecord.date) return alert('請選擇日期');
        currentStep = 2; showStep(currentStep);
      } 
      else if (currentStep === 2) {
        if (!currentRecord.category) return alert('請選擇一個大項目');
        currentStep = 3; showStep(currentStep);
      } 
      else if (currentStep === 3) {
        currentRecord.detail = document.getElementById('input-detail').value.trim();
        if (!currentRecord.detail) return alert('請填寫細項說明');
        currentStep = 4; showStep(currentStep);
      } 
      else if (currentStep === 4) {
        const amt = parseFloat(document.getElementById('input-amount').value);
        if (isNaN(amt) || amt <= 0) return alert('請輸入正確的金額');
        currentRecord.amount = amt;
        currentStep = 5; showStep(currentStep);
      } 
      else if (currentStep === 5) {
        currentRecord.note = document.getElementById('input-note').value.trim();
        saveRecord();
      }
    }

    function saveRecord() {
      const records = getRecords();
      currentRecord.synced = false; 

      if (editingId !== null) {
        const index = records.findIndex(r => r.id === editingId);
        if (index !== -1) records[index] = { ...currentRecord };
      } else {
        records.push({ ...currentRecord });
      }
      
      localStorage.setItem('cool_ledger_data', JSON.stringify(records));
      
      // 記帳完，將視角自動切回該筆消費的月份
      selectedMonthStr = currentRecord.date.substring(0, 7);

      closeLedger();
      updateDashboard(true); // 重新建立卡片

      const payloadToSend = { ...currentRecord };
      setTimeout(() => { sendToCloud(payloadToSend); }, 10);
    }

    function deleteCurrentRecord() {
      if (editingId === null) return;
      if (confirm('確定要刪除這筆紀錄嗎？（雲端也會自動連動刪除）')) {
        const idToDelete = editingId;
        let records = getRecords();
        records = records.filter(r => r.id !== idToDelete);
        localStorage.setItem('cool_ledger_data', JSON.stringify(records));
        
        closeLedger();
        updateDashboard(true); // 刪除可能導致某月份消失，重新建立卡片

        setTimeout(() => { sendToCloud({ id: idToDelete, action: "delete" }); }, 10);
      }
    }

    function clearLocalOnly() {
      const records = getRecords();
      if (records.length === 0) return alert("本地目前本來就是空的喔！");

      if (confirm("確定要刷掉「這台手機上」的所有紀錄嗎？\n\n⚠️ 注意：這只會清空手機畫面，你在 Google 試算表上的資料會完整保留，完全不受影響！")) {
        if (confirm("最後確認：真的要清空手機端嗎？（此動作無法復原）")) {
          localStorage.removeItem('cool_ledger_data'); 
          selectedMonthStr = new Date().toLocaleDateString('en-CA').substring(0, 7);
          alert("🧹 本地紀錄已完全刷洗乾淨！");
          toggleHistoryPage(false);
          updateDashboard(true);
        }
      }
    }

    function sendToCloud(payload) {
      if (!GOOGLE_GAS_URL || GOOGLE_GAS_URL.includes("你的")) return;

      fetch(GOOGLE_GAS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
      .then(() => {
        if (payload.action !== "delete") {
          const records = getRecords();
          const target = records.find(r => r.id === payload.id);
          if (target) {
            target.synced = true;
            localStorage.setItem('cool_ledger_data', JSON.stringify(records));
            updateDashboard(false); // 僅更新同步標籤狀態，不重建卡片防止干擾滑動
          }
        }
      })
      .catch(err => console.error("背景即時同步失敗：", err));
    }

    function getRecords() { return JSON.parse(localStorage.getItem('cool_ledger_data') || '[]'); }

    function initChart() {
      const ctx = document.getElementById('expense-chart').getContext('2d');
      chartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: { labels: [], datasets: [{ data: [], backgroundColor: ['#f87171', '#60a5fa', '#fbbf24', '#34d399', '#a78bfa', '#9ca3af'], borderWidth: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
      });
    }

    // 🚀 核心監聽：當使用者滑動輸送帶時
    function handleSliderScroll() {
      clearTimeout(scrollTimeout);
      // 防抖處理：等使用者手停下來 50 毫秒後才判定切換
      scrollTimeout = setTimeout(() => {
        const slider = document.getElementById('month-slider');
        const cardWidth = slider.clientWidth;
        if (cardWidth === 0) return;
        
        // 計算當前滑到第幾張卡片
        const pageIndex = Math.round(slider.scrollLeft / cardWidth);
        if (availableMonths[pageIndex] && availableMonths[pageIndex] !== selectedMonthStr) {
          selectedMonthStr = availableMonths[pageIndex];
          updateDashboard(false); // 刷新該月份的圓餅圖與明細
        }
      }, 50);
    }

    function createItemHtml(r) {
      const icon = categoryIcons[r.category] || '✨';
      const syncStatus = r.synced 
        ? `<span class="text-[9px] text-emerald-400/80 bg-emerald-950/30 border border-emerald-900/40 px-1.5 py-0.5 rounded-md">☁️ 已同步</span>`
        : `<span class="text-[9px] text-amber-400/80 bg-amber-950/30 border border-amber-900/40 px-1.5 py-0.5 rounded-md">⏳ 同步中</span>`;
      
      return `
        <div onclick="openLedger('${r.id}'); event.stopPropagation();" class="flex justify-between items-center bg-gray-900/60 border border-gray-800/60 rounded-xl p-3 active:bg-gray-800 transition-colors">
          <div class="flex items-center space-x-3">
            <span class="text-xl bg-gray-800 p-1.5 rounded-lg">${icon}</span>
            <div>
              <div class="flex items-center space-x-2">
                <p class="text-sm font-bold text-gray-200">${r.detail}</p>
                ${syncStatus}
              </div>
              <p class="text-[10px] text-gray-500">${r.date} ${r.note ? '· ' + r.note : ''}</p>
            </div>
          </div>
          <span class="text-sm font-extrabold text-indigo-400">$${r.amount}</span>
        </div>
      `;
    }

    // 🚀 核心渲染邏輯：重構與連動
    function updateDashboard(rebuildSlider = false) {
      const records = getRecords();
      
      // 1. 找出所有存在數據的月份
      const monthsSet = new Set();
      const thisMonthStr = new Date().toLocaleDateString('en-CA').substring(0, 7);
      monthsSet.add(thisMonthStr); // 確保不管有沒有記帳，一定有當月卡片
      
      records.forEach(r => {
        if (r.date && r.date.length >= 7) {
          monthsSet.add(r.date.substring(0, 7));
        }
      });
      
      // 由舊到新排序月份
      availableMonths = Array.from(monthsSet).sort();

      // 2. 如果要求重構 Slider (新增、刪除或初始化時)
      if (rebuildSlider) {
        const slider = document.getElementById('month-slider');
        slider.innerHTML = '';
        
        // 算出每個月份的總金額
        availableMonths.forEach(mStr => {
          let mTotal = 0;
          records.forEach(r => {
            if (r.date.startsWith(mStr)) mTotal += r.amount;
          });
          
          const [year, month] = mStr.split('-');
          slider.innerHTML += `
            <div class="snap-card text-center py-4">
              <p class="text-xs text-gray-400 tracking-wider">${year} 年 ${month} 月累計</p>
              <h1 class="text-4xl font-extrabold text-indigo-400 mt-0.5">$${mTotal.toLocaleString()}</h1>
            </div>
          `;
        });

        // 定位到當前選中的月份卡片
        setTimeout(() => {
          const targetIndex = availableMonths.indexOf(selectedMonthStr);
          if (targetIndex !== -1) {
            slider.scrollLeft = targetIndex * slider.clientWidth;
          }
        }, 100);
      }

      // 3. 更新頂部 Badge 狀態標籤
      const [sYear, sMonth] = selectedMonthStr.split('-');
      document.getElementById('current-month-badge').innerText = `${sYear} 年 ${sMonth} 月`;

      // 4. 計算選中月份的明細與圓餅圖數據
      let selectedMonthTotal = 0;
      const catTotals = {};
      
      const recentList = document.getElementById('recent-list');
      const fullHistoryList = document.getElementById('full-history-list');
      
      recentList.innerHTML = '';
      fullHistoryList.innerHTML = '';

      // 排序歷史紀錄 (最新在上)
      const sortedRecords = [...records].sort((a, b) => new Date(b.date) - new Date(a.date));
      let matchMonthCount = 0;

      sortedRecords.forEach((r) => {
        const html = createItemHtml(r);
        fullHistoryList.insertAdjacentHTML('beforeend', html); // 總明細頁面包含所有歷史

        // 主畫面明細則只顯示當前滑動選中月份的資料
        if (r.date.startsWith(selectedMonthStr)) {
          selectedMonthTotal += r.amount;
          catTotals[r.category] = (catTotals[r.category] || 0) + r.amount;
          
          recentList.insertAdjacentHTML('beforeend', html);
          matchMonthCount++;
        }
      });

      if (matchMonthCount === 0) recentList.innerHTML = '<p class="text-center text-xs text-gray-600 py-4">該月份尚無任何明細</p>';
      if (records.length === 0) fullHistoryList.innerHTML = '<p class="text-center text-xs text-gray-600 py-8">目前沒有任何記帳紀錄</p>';

      // 5. 更新圓餅圖
      const labels = Object.keys(catTotals);
      const data = Object.values(catTotals);

      if (labels.length === 0) {
        document.getElementById('no-data-tip').classList.remove('hidden');
        chartInstance.data.labels = []; chartInstance.data.datasets[0].data = [];
      } else {
        document.getElementById('no-data-tip').classList.add('hidden');
        chartInstance.data.labels = labels; chartInstance.data.datasets[0].data = data;
      }
      chartInstance.update();
    }
  </script>
</body>
</html>
